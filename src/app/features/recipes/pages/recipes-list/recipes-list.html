<div class="recipes-page">

  <!-- BACKGROUND -->

  <div class="page-background">

    <img
      src="recipe-bg.png"
      class="bg-left"
      alt="">

    <img
      src="recipe-bg2.png"
      class="bg-right"
      alt="">

  </div>

  <!-- CONTAINER -->

  <div class="recipes-container">

    <!-- ================= HEADER ================= -->

    <header class="page-header">

      <div class="header-left">

        <div class="logo-wrapper">

          <img
            src="logo.png"
            alt="Logo"
            class="logo">

          <div class="header-title">

            <h1>Tarif Defterim</h1>

            <p>

              Lezzetli tariflerini yönet ve yenilerini keşfet.

            </p>

            <span></span>

          </div>

        </div>

      </div>

      <div class="header-right">

        <a
          routerLink="/recipes/new"
          class="new-button">

          <span>＋</span>

          Yeni Tarif

        </a>

        <div class="profile">

          <img
            src="avatar.png"
            alt="Avatar">

        </div>

      </div>

    </header>

    <!-- ================= SEARCH ================= -->

    <section class="search-area">

      <div class="search-box">

        <span>🔍</span>

        <input

          [ngModel]="search()"

          (ngModelChange)="updateSearch($event)"

          placeholder="Tarif ara..."

          type="text">

      </div>

      <div class="category-box">

        <select

          [ngModel]="selectedCategory()"

          (ngModelChange)="updateCategory($event)">

          <option

            *ngFor="let category of categories"

            [value]="category">

            {{category}}

          </option>

        </select>

      </div>

      <button

        class="favorite-filter"

        [class.active]="onlyFavorites()"

        (click)="toggleFavorites()">

        ⭐

        Sadece Favoriler

      </button>

    </section>

    <!-- ================= STATS ================= -->

    <section class="stats">

      <div class="stat-card orange">

        <div class="icon">

          📖

        </div>

        <div>

          <h2>

            {{totalRecipes()}}

          </h2>

          <p>

            Toplam Tarif

          </p>

        </div>

      </div>

      <div class="stat-card pink">

        <div class="icon">

          ❤️

        </div>

        <div>

          <h2>

            {{totalFavorites()}}

          </h2>

          <p>

            Favoriler

          </p>

        </div>

      </div>

      <div class="stat-card purple">

        <div class="icon">

          🍽️

        </div>

        <div>

          <h2>

            {{currentCategoryCount()}}

          </h2>

          <p>

            Gösterilen

          </p>

        </div>

      </div>

    </section>

    <!-- ================= SORT ================= -->

    <section class="sort-bar">

      <button

        [class.active]="favoriteFirst()"

        (click)="toggleFavoriteFirst()">

        ⭐ Favoriler

      </button>

      <button

        [class.active]="sortType()==='none'"

        (click)="changeSort('none')">

        Varsayılan

      </button>

      <button

        [class.active]="sortType()==='az'"

        (click)="changeSort('az')">

        A-Z

      </button>

      <button

        [class.active]="sortType()==='za'"

        (click)="changeSort('za')">

        Z-A

      </button>

      <button

        [class.active]="sortType()==='durationAsc'"

        (click)="changeSort('durationAsc')">

        ⏱ Kısa

      </button>

      <button

        [class.active]="sortType()==='durationDesc'"

        (click)="changeSort('durationDesc')">

        ⌛ Uzun

      </button>

      <button

        [class.active]="sortType()==='newest'"

        (click)="changeSort('newest')">

        🆕 En Yeni

      </button>

    </section>
        <!-- ================= RECIPES ================= -->

    <section class="recipes-grid">

      <ng-container
        *ngIf="filteredRecipes().length > 0; else emptyState">

        <div
          class="recipe-item"
          *ngFor="let recipe of filteredRecipes()">

          <app-recipe-card

  [recipe]="recipe"

  (favoriteClick)="toggleFavorite($event)"

  (deleteClick)="deleteRecipe($event)">

</app-recipe-card>

        </div>

      </ng-container>

    </section>

    <!-- ================= EMPTY ================= -->

    <ng-template #emptyState>

      <section class="empty-state">

        <div class="empty-card">

          <div class="empty-image">

            🍳

          </div>

          <h2>

            Tarif Bulunamadı

          </h2>

          <p>

            Aradığınız kriterlere uygun herhangi bir tarif bulunamadı.

          </p>

          <button

            class="reset-button"

            (click)="
              updateSearch('');
              updateCategory('Tümü');
              onlyFavorites.set(false);
              favoriteFirst.set(false);
              sortType.set('none')
            ">

            Filtreleri Temizle

          </button>

        </div>

      </section>

    </ng-template>

  </div>

</div>
